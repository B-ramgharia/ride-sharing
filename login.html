<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Premium Ride Sharing Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "primary": "#3fff8b",
                  "primary-container": "#13ea79",
                  "on-primary": "#005d2c",
                },
                fontFamily: {
                  "headline": ["Manrope"],
                  "inter": ["Inter"],
                },
              },
            },
          }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0e0e0e; color: #ffffff; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .kinetic-glass { background: rgba(38, 38, 38, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .heading-gradient { background: linear-gradient(to right, #3fff8b, #13ea79, #74fbbb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .map-gradient-overlay { background: linear-gradient(to right, rgba(14, 14, 14, 1) 0%, rgba(14, 14, 14, 0.8) 30%, rgba(14, 14, 14, 0) 100%); }
    </style>
</head>
<body class="bg-[#0e0e0e] min-h-screen relative overflow-x-hidden">
    
    <!-- Background Map Image -->
    <div class="fixed inset-0 z-0">
        <img class="w-full h-full object-cover filter grayscale contrast-125 brightness-50" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4uy4czTtXnUi3vww6fphmoeuNBTd1kf6EUWq3pBfAamwYhRwiEhfqJfPFoyOTPr6yHEOBemDSxfL7XQkMDTrAIUSCpEGPwYlOW2rhxyJ3aFMpo1BeWDNEa3mQD8kyfbfKuKBUyZWru3CIqqfvW3_QUcyw5FG4m7Jl-KiAVARIuiL6j2ZpI_lYNf6dsHg3Hp4wyyZV_7epS9MSa-_nj2adJLq2pbWlcCTfehhJLvMSqr-ZOXacth-Id6Vh8zisED2oVJY1jTACi_g"/>
        <div class="absolute inset-0 map-gradient-overlay"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-[#0e0e0e] via-transparent to-transparent"></div>
    </div>

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between kinetic-glass border border-white/10 px-6 py-3 rounded-2xl shadow-xl">
            <a href="index.html" class="text-2xl font-black heading-gradient tracking-tighter hover:opacity-80 transition-opacity italic font-headline">KINETIC</a>
            
            <div class="flex items-center space-x-6">
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="pt-24 pb-12 relative z-10">
        <div class="max-w-md mx-auto px-6 min-h-[80vh] flex flex-col justify-center">
            <div class="kinetic-glass border border-white/10 p-10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative overflow-hidden">
                <!-- Glow -->
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/20 blur-[80px]"></div>
                
                <div class="text-center mb-10 relative z-10">
                    <h2 class="text-4xl font-black text-white mb-2 tracking-tight font-headline">Login to <span class="heading-gradient">Kinetic.</span></h2>
                    <p class="text-neutral-400">Welcome back! Access your rides.</p>
                </div>

                <form id="login-form" class="space-y-6 relative z-10">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-neutral-400">Email Address</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-neutral-500"></i>
                            <input type="email" id="login-email" required
                                class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:border-primary outline-none transition-all text-white placeholder-neutral-600"
                                placeholder="you@example.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2 text-neutral-400">Password</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-neutral-500"></i>
                            <input type="password" id="login-password" required
                                class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:border-primary outline-none transition-all text-white placeholder-neutral-600"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" 
                        class="w-full py-4 bg-primary hover:bg-primary-container text-black rounded-2xl font-bold text-lg shadow-[0_0_20px_rgba(63,255,139,0.3)] transition-all active:scale-95 flex items-center justify-center space-x-2">
                        <span>Sign In</span>
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                    <p id="error-msg" class="text-error text-xs text-center hidden"></p>
                </form>

                <div class="mt-8 text-center relative z-10">
                    <p class="text-neutral-500 text-sm">
                        Don't have an account? <a href="register.html" class="text-primary font-bold hover:underline italic">Register now</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Login Logic -->
    <script>
        lucide.createIcons();
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('error-msg');

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user_name', data.user.username);
                    localStorage.setItem('user_email', data.user.email);
                    localStorage.setItem('auth_token', data.token);
                    window.location.href = 'app.html';
                } else {
                    errorEl.innerText = data.error || 'Login failed';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorEl.innerText = 'Connection error. Is the server running?';
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
