<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "primary": "#3fff8b",
                  "primary-container": "#13ea79",
                  "on-primary": "#005d2c",
                  "surface": "#0e0e0e",
                  "on-surface": "#ffffff",
                  "on-surface-variant": "#adaaaa",
                  "background": "#0e0e0e",
                  "outline-variant": "#484847",
                },
                fontFamily: {
                  "headline": ["Manrope"],
                  "body": ["Inter"],
                },
              },
            },
          }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0e0e0e; color: #ffffff; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .kinetic-glass {
            background: rgba(38, 38, 38, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="overflow-x-hidden selection:bg-primary selection:text-on-primary">
    <!-- Top Navigation Bar -->
    <header class="fixed top-0 w-full z-50 bg-neutral-950/60 backdrop-blur-xl flex justify-between items-center px-8 py-4 shadow-[0_8px_32px_rgba(63,255,139,0.08)]">
        <div class="flex items-center gap-12">
            <div class="text-2xl font-black text-emerald-400 italic font-manrope font-bold tracking-tight">KINETIC</div>
            <nav class="hidden md:flex gap-8 items-center">
                <a class="font-manrope font-bold tracking-tight text-neutral-400 hover:text-emerald-300 transition-colors duration-300 active:scale-95 transition-transform" href="index.html">Rides</a>
                <a class="font-manrope font-bold tracking-tight text-neutral-400 hover:text-emerald-300 transition-colors duration-300 active:scale-95 transition-transform" href="safety.html">Safety</a>
                <a class="font-manrope font-bold tracking-tight text-emerald-400 border-b-2 border-emerald-400 pb-1 hover:text-emerald-300 transition-colors duration-300 active:scale-95 transition-transform" href="support.html">Support</a>
            </nav>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="window.location.href='login.html'" class="font-manrope font-bold tracking-tight text-neutral-400 hover:text-emerald-300 transition-colors duration-300 active:scale-95 transition-transform">Login</button>
            <button onclick="window.location.href='login.html'" class="bg-primary text-on-primary font-manrope font-bold tracking-tight px-6 py-2 rounded-lg hover:bg-primary-container transition-all active:scale-95">Sign Up</button>
        </div>
    </header>

    <main class="relative min-h-screen w-full pt-48 px-8 container mx-auto flex flex-col items-center text-center">
        <h1 class="text-5xl md:text-7xl font-headline font-extrabold tracking-tighter leading-tight mb-6">
            Always Here to <span class="text-primary italic">Help.</span>
        </h1>
        <p class="text-on-surface-variant text-lg md:text-xl font-body max-w-2xl mx-auto mb-16 leading-relaxed">
            Need assistance with a past ride, an upcoming booking or facing any issues? Our elite support network is available around the clock.
        </p>

        <div class="w-full max-w-2xl mx-auto kinetic-glass p-8 rounded-xl border border-white/10 text-left">
            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-bold mb-2 text-on-surface">Your Name</label>
                    <input type="text" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:ring-1 focus:ring-primary outline-none transition-all text-white" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-on-surface">Your Email</label>
                    <input type="email" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:ring-1 focus:ring-primary outline-none transition-all text-white" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-on-surface">How can we help?</label>
                    <textarea class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:ring-1 focus:ring-primary outline-none transition-all text-white h-32" placeholder="Tell us about the issue..."></textarea>
                </div>
                <button type="button" class="w-full py-4 bg-primary text-green-950 hover:bg-primary-container rounded-xl font-bold tracking-wide active:scale-95 transition-all text-lg shadow-[0_0_20px_rgba(63,255,139,0.3)]">
                    Send Message
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-surface py-12 px-8 border-t border-outline-variant/10 mt-20">
        <div class="container mx-auto flex flex-col items-center text-center">
            <div class="text-xl font-black text-emerald-400 italic font-manrope mb-4">KINETIC</div>
            <p class="text-xs text-on-surface-variant/50">© 2024 KINETIC MOBILITY INC. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>
</body>
</html>
