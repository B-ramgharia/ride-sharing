<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Premium Ride Sharing Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .heading-gradient { background: linear-gradient(to right, #818cf8, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-mesh { background: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(219, 39, 119, 0.15) 0px, transparent 50%), radial-gradient(at 50% 100%, rgba(124, 58, 237, 0.1) 0px, transparent 50%); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen relative overflow-x-hidden bg-gradient-mesh">
    
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between glass px-6 py-3 rounded-2xl shadow-xl">
            <a href="index.html" class="text-2xl font-black heading-gradient tracking-tighter hover:opacity-80 transition-opacity italic">KINETIC</a>
            
            <div class="flex items-center space-x-6">
                <a href="login.html" class="text-slate-400 hover:text-white transition-colors text-sm font-medium">Login</a>
                <a href="login.html" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-600/20 transition-all active:scale-95">Get Started</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="pt-24 pb-12">
        <div class="max-w-md mx-auto px-6 min-h-[80vh] flex flex-col justify-center">
            <div class="glass p-10 rounded-3xl shadow-2xl border-white/10 relative overflow-hidden">
                <!-- Glow -->
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500/20 blur-[80px]"></div>
                
                <div class="text-center mb-10">
                    <h2 class="text-4xl font-black text-white mb-2 tracking-tight">Login to <span class="heading-gradient">Kinetic.</span></h2>
                    <p class="text-slate-400">Welcome back! Access your rides.</p>
                </div>

                <form method="GET" action="app.html" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Email Address</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                            <input type="email" name="email" required
                                class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:border-indigo-500 outline-none transition-all text-white placeholder-slate-600"
                                placeholder="you@example.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2 text-slate-400">Password</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                            <input type="password" name="password" required
                                class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:border-indigo-500 outline-none transition-all text-white placeholder-slate-600"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" 
                        class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold text-lg shadow-xl shadow-indigo-600/20 transition-all active:scale-95 flex items-center justify-center space-x-2">
                        <span>Sign In</span>
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-slate-500 text-sm">
                        Don't have an account? <a href="login.html" class="text-indigo-400 font-bold hover:underline italic">Register now</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Lucide Init -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
